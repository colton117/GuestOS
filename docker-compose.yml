services:
  migrate:
    build:
      context: .
      target: builder
    user: "1001:1001"
    env_file: .env
    working_dir: /app
    command: npx prisma migrate deploy

  guestos:
    build: .
    ports:
      - "127.0.0.1:3001:3000"
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
